<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="patients.css">
</head>
<body>

    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
    </div>

    <div class="seminavbar">
        <button class="mainbtn">Book Appointment</button>
        <button class="mainbtn">Your Medical History</button>
        <button class="mainbtn">Reports</button>
    </div>

    <div class="feature-slider">
        <div class="feature active">
            <div class="feature-image"><img src="1.png"></div>
            <div class="feature-content">
                <h2>Book Appointments</h2>
                <p>Schedule hospital visits easily without waiting in queues.</p>
            </div>
        </div>

        <div class="feature">
            <div class="feature-image"><img src="3.png"></div>
            <div class="feature-content">
                <h2>Find Doctors</h2>
                <p>Search doctors based on specialization and availability.</p>
            </div>
        </div>

        <div class="feature">
            <div class="feature-image"><img src="2.png"></div>
            <div class="feature-content">
                <h2>View Medical Records</h2>
                <p>Access your reports and appointment history anytime.</p>
            </div>
        </div>

        <button class="prev" onclick="changeFeature(-1)">❮</button>
        <button class="next" onclick="changeFeature(1)">❯</button>
    </div>

    <script>
        let current = 0;
        let features = document.getElementsByClassName("feature");
        let interval;

        showFeature(current);
        startAuto();

        function showFeature(index) {
            for (let i = 0; i < features.length; i++) {
                features[i].classList.remove("active");
            }
            features[index].classList.add("active");
        }

        function changeFeature(direction) {
            clearInterval(interval);
            current += direction;
            if (current >= features.length) current = 0;
            if (current < 0) current = features.length - 1;
            showFeature(current);
            startAuto();
        }

        function nextAuto() {
            current++;
            if (current >= features.length) current = 0;
            showFeature(current);
        }

        function startAuto() {
            interval = setInterval(nextAuto, 4000);
        }
    </script>

</body>
</html>
