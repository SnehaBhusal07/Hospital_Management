<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Medical History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='patients.css') }}">
</head>
<body>

    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
    </div>

    <div class="page">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/patient/dashboard">Dashboard</a>
                <a href="/patient/find-doctors">Find Doctors</a>
                <a href="/patient/appointments">My Appointment</a>
                <a href="/patient/medical-history" class="active">Medical History</a>
                <a href="/patient/reports">Reports</a>
            </nav>
            <div class="doc-info">
                <div class="avatar" id="patient-avatar">--</div>
                <p id="patient-name">Loading...</p>
                <p>Patient</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <!-- MAIN -->
        <div class="main">

            <div class="topbar">
                <div>
                    <h2>Medical History</h2>
                    <p>Your complete health timeline</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Patient summary card -->
            <div class="patient-card" id="patient-card">
                <div class="doctor-avatar" id="card-avatar">--</div>
                <div class="doctor-info">
                    <h3 id="card-name">Loading...</h3>
                    <div class="info-row">
                        <span><strong>Phone:</strong>
                            <span id="card-phone">-</span>
                        </span>
                        <span><strong>Total Visits:</strong>
                            <span id="card-visits">-</span>
                        </span>
                    </div>
                </div>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Timeline section -->
            <div class="appointment-section">
                <h3>Visit Timeline</h3>
                <div class="timeline" id="timeline-container">
                    <p style="color:#888; font-size:13px; padding:10px;">
                        Loading history...
                    </p>
                </div>
            </div>

        </div>
    </div>

    <script>

        // ---- 1. Auto date ----
        const today = new Date();
        const options = {
            weekday: 'short', day: 'numeric',
            month: 'long', year: 'numeric'
        };
        document.getElementById('current-date').textContent =
            today.toLocaleDateString('en-GB', options);


        // ---- 2. Load patient info ----
        async function loadPatientInfo() {
            try {
                const res  = await fetch('/api/patient/dashboard');
                const data = await res.json();
                if (!res.ok) { window.location.href = '/'; return; }

                // update sidebar
                document.getElementById('patient-name').textContent = data.name;
                const initials = data.name.split(' ')
                    .map(function(n) { return n[0]; })
                    .join('').toUpperCase();
                document.getElementById('patient-avatar').textContent = initials;

                // update patient card
                document.getElementById('card-name').textContent = data.name;
                document.getElementById('card-avatar').textContent = initials;
                document.getElementById('card-phone').textContent =
                    data.phone || 'N/A';
                document.getElementById('card-visits').textContent =
                    data.completed || 0;

            } catch(e) { window.location.href = '/'; }
        }


        // ---- 3. Load medical history ----
        async function loadHistory() {
            try {
                const res  = await fetch('/api/my-history');
                const data = await res.json();

                if (!res.ok) {
                    showPageMsg(data.message || 'Failed to load.', 'error');
                    return;
                }

                buildTimeline(data.medical_history);

            } catch(e) {
                showPageMsg('Could not connect to server.', 'error');
            }
        }


        // ---- 4. Build timeline ----
        function buildTimeline(records) {
            const container = document.getElementById('timeline-container');

            if (records.length === 0) {
                container.innerHTML =
                    '<p style="color:#888; font-size:13px; padding:10px;">' +
                    'No medical history found.</p>';
                return;
            }

            container.innerHTML = '';

            records.forEach(function(record) {

                // format date nicely
                const dateObj = new Date(record.date);
                const dateOptions = {
                    day: 'numeric', month: 'long', year: 'numeric'
                };
                const formattedDate = dateObj.toLocaleDateString(
                    'en-GB', dateOptions
                );

                // create timeline item
                const item = document.createElement('div');
                item.className = 'timeline-item';
                item.innerHTML =
                    '<div class="timeline-dot"></div>' +
                    '<div class="timeline-content">' +
                        '<div class="timeline-header">' +
                            '<span class="timeline-date">' +
                                formattedDate +
                            '</span>' +
                            '<span class="status gray">Completed</span>' +
                        '</div>' +
                        '<h4>' + record.doctor_name +
                            ' — ' + record.specialization + '</h4>' +
                        '<p><strong>Department:</strong> ' +
                            record.department + '</p>' +
                        '<p><strong>Diagnosis:</strong> ' +
                            (record.diagnosis || 'N/A') + '</p>' +
                        '<p><strong>Notes:</strong> ' +
                            (record.report || 'N/A') + '</p>' +
                    '</div>';

                container.appendChild(item);
            });
        }


        // ---- 5. Logout ----
        async function logout() {
            const confirmed = confirm('Are you sure you want to logout?');
            if (!confirmed) return;
            const res = await fetch('/api/logout', { method: 'POST' });
            if (res.ok) window.location.href = '/';
        }


        // ---- Helpers ----
        function showPageMsg(text, type) {
            const msg = document.getElementById('page-msg');
            msg.textContent      = text;
            msg.style.display    = 'block';
            msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
            msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';

            setTimeout(function() {
                msg.style.display = 'none';
            }, 3000);
        }


        // ---- Init ----
        loadPatientInfo();
        loadHistory();

    </script>

</body>
</html>
