<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient History</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='doctors.css') }}">
</head>
<body>
    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
    </div>

    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/doctor/dashboard">Dashboard</a>
                <a href="/doctor/schedule">Schedule</a>
                <a href="/doctor/patient-history" class="active">Patients</a>
                <a href="/doctor/update-diagnosis">Report</a>
            </nav>
            <div class="doc-info">
                <div class="avatar" id="doc-avatar">--</div>
                <p id="doc-name">Loading...</p>
                <p id="doc-spec">Loading...</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>Patient History</h2>
                    <p>View detailed patient records</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Patient selector -->
            <div style="background:white; margin:15px 20px;
                border-radius:8px; padding:15px;">
                <h3 style="margin-bottom:10px;">Select Patient</h3>
                <select id="patient-select" style="
                    width:100%; padding:10px;
                    border:1px solid #ccc; border-radius:6px;
                    font-size:13px; color:#333;">
                    <option value="">-- Select a patient --</option>
                </select>
            </div>

            <!-- Patient info card -->
            <div id="patient-card" style="display:none;
                background:white; margin:0 20px 15px;
                border-radius:8px; padding:15px;
                border-left:4px solid #0F4C5C;
                display:none;">
                <div style="display:flex; align-items:center; gap:15px;">
                    <div id="pat-avatar" style="
                        width:50px; height:50px;
                        background:#e1f5ee; color:#0F4C5C;
                        border-radius:50%; display:flex;
                        align-items:center; justify-content:center;
                        font-size:18px; font-weight:bold;">
                    </div>
                    <div>
                        <h3 id="pat-name" style="color:#333;"></h3>
                        <p id="pat-email" style="font-size:13px;
                            color:#888;"></p>
                    </div>
                    <button id="update-btn" onclick="goToUpdate()"
                        style="margin-left:auto; padding:8px 16px;
                        background:#0F4C5C; color:white; border:none;
                        border-radius:6px; font-size:13px; cursor:pointer;">
                        Update Diagnosis
                    </button>
                </div>
            </div>

            <!-- History timeline -->
            <div style="background:white; margin:0 20px;
                border-radius:8px; padding:15px;">
                <h3 style="margin-bottom:12px;">Visit History</h3>
                <div id="history-container">
                    <p style="color:#888; font-size:13px;">
                        Select a patient to view their history.
                    </p>
                </div>
            </div>

        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = {
        weekday: 'short', day: 'numeric',
        month: 'long', year: 'numeric'
    };
    document.getElementById('current-date').textContent =
        today.toLocaleDateString('en-GB', options);

    let selectedPatientId   = null;
    let selectedPatientName = null;


    // ---- 2. Load doctor info ----
    async function loadDoctorInfo() {
        try {
            const res  = await fetch('/api/doctor/me');
            if (!res.ok) { window.location.href = '/'; return; }
            const data = await res.json();

            document.getElementById('doc-name').textContent = data.name;
            document.getElementById('doc-spec').textContent = data.specialization;
            const initials = data.name.split(' ')
                .map(function(n) { return n[0]; })
                .join('').toUpperCase();
            document.getElementById('doc-avatar').textContent = initials;

        } catch(e) {
            showMsg('Could not load doctor info.', 'error');
        }
    }


    // ---- 3. Load patients from appointments ----
    async function loadPatients() {
        try {
            const res  = await fetch('/api/doctor/appointments');
            if (!res.ok) return;
            const data = await res.json();

            // get unique patients
            const seen     = {};
            const patients = [];
            data.appointments.forEach(function(appt) {
                if (!seen[appt.patient_id]) {
                    seen[appt.patient_id] = true;
                    patients.push({
                        id   : appt.patient_id,
                        name : appt.patient_name,
                        email: appt.patient_email
                    });
                }
            });

            // fill dropdown
            const select = document.getElementById('patient-select');
            patients.forEach(function(p) {
                const option = document.createElement('option');
                option.value       = p.id;
                option.textContent = p.name;
                option.dataset.email = p.email;
                select.appendChild(option);
            });

            // check if patient_id in URL
            const urlParams = new URLSearchParams(window.location.search);
            const patId = urlParams.get('patient_id');
            if (patId) {
                select.value = patId;
                select.dispatchEvent(new Event('change'));
            }

        } catch(e) {
            showMsg('Could not load patients.', 'error');
        }
    }


    // ---- 4. Patient dropdown change ----
    document.getElementById('patient-select').addEventListener(
        'change', async function() {

        const patientId = this.value;
        if (!patientId) {
            document.getElementById('patient-card').style.display = 'none';
            document.getElementById('history-container').innerHTML =
                '<p style="color:#888; font-size:13px;">' +
                'Select a patient to view their history.</p>';
            return;
        }

        const selectedOption = this.options[this.selectedIndex];
        selectedPatientId    = patientId;
        selectedPatientName  = selectedOption.textContent;

        // show patient card
        const card = document.getElementById('patient-card');
        card.style.display = 'flex';

        const initials = selectedPatientName.split(' ')
            .map(function(n) { return n[0]; })
            .join('').toUpperCase();

        document.getElementById('pat-avatar').textContent = initials;
        document.getElementById('pat-name').textContent   = selectedPatientName;
        document.getElementById('pat-email').textContent  =
            selectedOption.dataset.email || '';

        // load history
        loadHistory(patientId);
    });


    // ---- 5. Load patient history ----
    async function loadHistory(patientId) {
        const container = document.getElementById('history-container');
        container.innerHTML =
            '<p style="color:#888; font-size:13px;">Loading history...</p>';

        try {
            const res  = await fetch(
                '/api/doctor/patient/' + patientId + '/history'
            );
            const data = await res.json();

            if (!res.ok) {
                container.innerHTML =
                    '<p style="color:#c0392b; font-size:13px;">' +
                    (data.message || 'Failed to load history.') + '</p>';
                return;
            }

            if (data.history.length === 0) {
                container.innerHTML =
                    '<p style="color:#888; font-size:13px;">' +
                    'No medical history found for this patient.</p>';
                return;
            }

            container.innerHTML = '';
            data.history.forEach(function(record) {

                const dateObj = new Date(record.date);
                const dateOptions = {
                    day: 'numeric', month: 'long', year: 'numeric'
                };
                const formattedDate = dateObj.toLocaleDateString(
                    'en-GB', dateOptions
                );

                const item = document.createElement('div');
                item.style.cssText =
                    'display:flex; gap:15px; margin-bottom:15px;';
                item.innerHTML =
                    '<div style="width:14px; height:14px; border-radius:50%;' +
                        'background:#0F4C5C; flex-shrink:0; margin-top:4px;">' +
                    '</div>' +
                    '<div style="background:#f9f9f9; border-radius:8px;' +
                        'padding:12px 15px; flex:1; border:1px solid #eee;">' +
                        '<p style="font-size:12px; color:#888;">' +
                            formattedDate + '</p>' +
                        '<p style="font-size:14px; font-weight:bold;' +
                            'color:#0F4C5C; margin:4px 0;">' +
                            'Diagnosis: ' + (record.diagnosis || 'N/A') +
                        '</p>' +
                        '<p style="font-size:13px; color:#555;">' +
                            'Notes: ' + (record.report || 'N/A') +
                        '</p>' +
                    '</div>';

                container.appendChild(item);
            });

        } catch(e) {
            container.innerHTML =
                '<p style="color:#c0392b; font-size:13px;">' +
                'Could not connect to server.</p>';
        }
    }


    // ---- 6. Go to update diagnosis ----
    function goToUpdate() {
        if (selectedPatientId) {
            window.location.href =
                '/doctor/update-diagnosis?patient_id=' +
                selectedPatientId + '&patient_name=' +
                encodeURIComponent(selectedPatientName);
        }
    }


    // ---- 7. Logout ----
    async function logout() {
    const confirmed = confirm('Are you sure you want to logout?');
    if (!confirmed) return;

    try {
        // check if admin session
        const sessionRes  = await fetch('/api/check-session');
        const sessionData = await sessionRes.json();

        let url = '/api/logout';
        if (sessionData.role === 'admin') {
            url = '/api/admin/logout';
        }

        const res = await fetch(url, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            window.location.href = '/';
        } else {
            // force redirect anyway
            window.location.href = '/';
        }

    } catch(e) {
        // force redirect even if fetch fails
        window.location.href = '/';
    }
}

    // ---- Helper ----
    function showMsg(text, type) {
        const msg = document.getElementById('page-msg');
        msg.textContent      = text;
        msg.style.display    = 'block';
        msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
        msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';
        setTimeout(function() { msg.style.display = 'none'; }, 3000);
    }


    // ---- Init ----
    loadDoctorInfo();
    loadPatients();

</script>
</body>
</html>
