<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal</title>
    <link rel="stylesheet" href="C:\Users\Spandan\OneDrive\Desktop\Hospital_Management\static\management.css">
</head>
<body>
    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management System</div>
    </div>
    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="management.html">Dashboard</a>
                <a href="manage-doctors.html">Manage Doctors</a>
                <a href="doctor-availability.html">Availability</a>
                <a href="appointments-monitor.html">Appointments</a>
                <a href="daily-schedule.html">Daily Schedule</a>
                <a href="system-settings.html" class="active">Settings</a>
            </nav>
            <div class="doc-info">
                <div class="avatar">AD</div>
                <p>Admin</p>
                <p>Management</p>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>System Settings</h2>
                    <p>Update hospital and system information</p>
                </div>
                <p id="current-date">Mon, 4 May 2026</p>
            </div>

            <!-- Hospital information -->
            <div class="appointment-section">
                <h3>Hospital Information</h3>
                <div class="add-doctor-form">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Hospital Name</label>
                            <input type="text" id="hospital-name"
                            value="MediPortal Hospital">
                        </div>
                        <div class="form-group">
                            <label>Registration Number</label>
                            <input type="text" id="reg-number"
                            value="REG-2024-001">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="hospital-email"
                            value="info@mediportal.com">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="hospital-phone"
                            value="01-4000000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="hospital-address"
                        value="Kathmandu, Bagmati Province, Nepal">
                    </div>

                    <div class="form-group">
                        <label>Website</label>
                        <input type="text" id="hospital-website"
                        value="www.mediportal.com">
                    </div>

                    <div class="form-buttons">
                        <button class="btn-save" id="save-hospital">
                            Save Changes
                        </button>
                        <button class="btn-cancel" id="cancel-hospital">
                            Cancel
                        </button>
                    </div>

                </div>
            </div>

            <!-- System preferences -->
            <div class="appointment-section">
                <h3>System Preferences</h3>
                <div class="add-doctor-form">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Appointment Slot Duration</label>
                            <select id="slot-duration">
                                <option>15 minutes</option>
                                <option>20 minutes</option>
                                <option>30 minutes</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Max Appointments Per Doctor</label>
                            <input type="number" id="max-appointments" 
                            value="32">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Hospital Opening Time</label>
                            <input type="time" id="open-time" value="08:00">
                        </div>
                        <div class="form-group">
                            <label>Hospital Closing Time</label>
                            <input type="time" id="close-time" value="18:00">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Working Days</label>
                        <div class="days-row">
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Mon
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Tue
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Wed
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Thu
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Fri
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" checked> Sat
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox"> Sun
                            </label>
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button class="btn-save" id="save-prefs">
                            Save Preferences
                        </button>
                        <button class="btn-cancel" id="cancel-prefs">
                            Cancel
                        </button>
                    </div>

                </div>
            </div>

            <!-- Change password -->
            <div class="appointment-section">
                <h3>Change Admin Password</h3>
                <div class="add-doctor-form">

                    <div class="form-group">
                        <label>Current Password</label>
                        <input type="password" id="current-pass"
                        placeholder="Enter current password">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>New Password</label>
                            <input type="password" id="new-pass"
                            placeholder="Enter new password">
                        </div>
                        <div class="form-group">
                            <label>Confirm New Password</label>
                            <input type="password" id="confirm-pass"
                            placeholder="Confirm new password">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button class="btn-save" id="save-password">
                            Update Password
                        </button>
                        <button class="btn-cancel" id="cancel-password">
                            Cancel
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = { 
        weekday: 'short', 
        day: 'numeric', 
        month: 'long', 
        year: 'numeric' 
    };
    document.getElementById('current-date').textContent = 
        today.toLocaleDateString('en-GB', options);


    // ---- 2. Save hospital info ----
    document.getElementById('save-hospital').addEventListener(
        'click', function() {

        const name = document.getElementById('hospital-name').value.trim();
        const email = document.getElementById('hospital-email').value.trim();
        const phone = document.getElementById('hospital-phone').value.trim();
        const address = document.getElementById('hospital-address').value.trim();

        if (!name) {
            alert('Hospital name cannot be empty!');
            return;
        }
        if (!email) {
            alert('Email cannot be empty!');
            return;
        }
        if (!phone) {
            alert('Phone cannot be empty!');
            return;
        }
        if (!address) {
            alert('Address cannot be empty!');
            return;
        }

        // update navbar title
        document.getElementById('name').textContent = 
            name + ' — Appointment and Patient Management System';

        alert('Hospital information saved successfully!');
    });


    // ---- 3. Cancel hospital info ----
    document.getElementById('cancel-hospital').addEventListener(
        'click', function() {
        document.getElementById('hospital-name').value = 'MediPortal Hospital';
        document.getElementById('reg-number').value = 'REG-2024-001';
        document.getElementById('hospital-email').value = 'info@mediportal.com';
        document.getElementById('hospital-phone').value = '01-4000000';
        document.getElementById('hospital-address').value = 
            'Kathmandu, Bagmati Province, Nepal';
        document.getElementById('hospital-website').value = 'www.mediportal.com';
    });


    // ---- 4. Save preferences ----
    document.getElementById('save-prefs').addEventListener(
        'click', function() {

        const maxAppt = document.getElementById('max-appointments').value;
        const openTime = document.getElementById('open-time').value;
        const closeTime = document.getElementById('close-time').value;

        if (!maxAppt || maxAppt < 1) {
            alert('Please enter a valid number of appointments!');
            return;
        }

        if (openTime >= closeTime) {
            alert('Closing time must be after opening time!');
            return;
        }

        const checkedDays = document.querySelectorAll(
            '.day-checkbox input:checked'
        );
        if (checkedDays.length === 0) {
            alert('Please select at least one working day!');
            return;
        }

        alert('System preferences saved successfully!');
    });


    // ---- 5. Cancel preferences ----
    document.getElementById('cancel-prefs').addEventListener(
        'click', function() {
        document.getElementById('max-appointments').value = '32';
        document.getElementById('open-time').value = '08:00';
        document.getElementById('close-time').value = '18:00';
        document.getElementById('slot-duration').selectedIndex = 0;
    });


    // ---- 6. Update password ----
    document.getElementById('save-password').addEventListener(
        'click', function() {

        const currentPass = document.getElementById('current-pass').value;
        const newPass = document.getElementById('new-pass').value;
        const confirmPass = document.getElementById('confirm-pass').value;

        if (!currentPass) {
            alert('Please enter your current password!');
            return;
        }

        if (!newPass) {
            alert('Please enter a new password!');
            return;
        }

        if (newPass.length < 6) {
            alert('New password must be at least 6 characters!');
            return;
        }

        if (newPass !== confirmPass) {
            alert('New passwords do not match!');
            return;
        }

        if (currentPass === newPass) {
            alert('New password must be different from current password!');
            return;
        }

        alert('Password updated successfully!');

        document.getElementById('current-pass').value = '';
        document.getElementById('new-pass').value = '';
        document.getElementById('confirm-pass').value = '';
    });


    // ---- 7. Cancel password ----
    document.getElementById('cancel-password').addEventListener(
        'click', function() {
        document.getElementById('current-pass').value = '';
        document.getElementById('new-pass').value = '';
        document.getElementById('confirm-pass').value = '';
    });

</script>
</body>
</html>
