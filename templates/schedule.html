<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doctor Schedule</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='doctors.css') }}">
</head>
<body>
    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
    </div>

    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/doctor/dashboard">Dashboard</a>
                <a href="/doctor/schedule" class="active">Schedule</a>
                <a href="/doctor/patient-history">Patients</a>
                <a href="/doctor/update-diagnosis">Report</a>
            </nav>
            <div class="doc-info">
                <div class="avatar" id="doc-avatar">--</div>
                <p id="doc-name">Loading...</p>
                <p id="doc-spec">Loading...</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>My Schedule</h2>
                    <p>View your patient appointments</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">
                    All
                </button>
                <button class="filter-btn" data-filter="today">
                    Today
                </button>
                <button class="filter-btn" data-filter="upcoming">
                    Upcoming
                </button>
                <button class="filter-btn" data-filter="completed">
                    Completed
                </button>
            </div>

            <!-- Schedule table -->
            <div class="appointment-section" style="background:white;
                margin:0 20px; border-radius:8px; padding:15px;">
                <h3>Patient Appointments
                    <span id="appt-count" style="
                        font-size:12px; background-color:#0F4C5C;
                        color:white; padding:2px 8px;
                        border-radius:12px; margin-left:8px;">
                    </span>
                </h3>
                <table id="schedule-table" style="margin-top:10px;">
                    <tr>
                        <th>Patient</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                    <tbody id="schedule-tbody">
                        <tr>
                            <td colspan="5" style="text-align:center;
                                color:#888;">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = {
        weekday: 'short', day: 'numeric',
        month: 'long', year: 'numeric'
    };
    document.getElementById('current-date').textContent =
        today.toLocaleDateString('en-GB', options);

    const todayStr = today.toISOString().split('T')[0];
    let allAppointments = [];


    // ---- 2. Load doctor info ----
    async function loadDoctorInfo() {
        try {
            const res  = await fetch('/api/doctor/me');
            if (!res.ok) { window.location.href = '/'; return; }
            const data = await res.json();

            document.getElementById('doc-name').textContent = data.name;
            document.getElementById('doc-spec').textContent = data.specialization;
            const initials = data.name.split(' ')
                .map(function(n) { return n[0]; })
                .join('').toUpperCase();
            document.getElementById('doc-avatar').textContent = initials;

        } catch(e) {
            showMsg('Could not load doctor info.', 'error');
        }
    }


    // ---- 3. Load appointments ----
    async function loadAppointments() {
        try {
            const res  = await fetch('/api/doctor/appointments');
            if (!res.ok) {
                showMsg('Failed to load appointments.', 'error');
                return;
            }
            const data = await res.json();
            allAppointments = data.appointments;
            buildTable(allAppointments);

        } catch(e) {
            showMsg('Could not connect to server.', 'error');
        }
    }


    // ---- 4. Build table ----
    function buildTable(appointments) {
        const tbody = document.getElementById('schedule-tbody');
        document.getElementById('appt-count').textContent =
            appointments.length;

        if (appointments.length === 0) {
            tbody.innerHTML =
                '<tr><td colspan="5" style="text-align:center; color:#888;">' +
                'No appointments found.</td></tr>';
            return;
        }

        tbody.innerHTML = '';
        appointments.forEach(function(appt) {

            let statusClass = 'orange';
            let statusText  = 'Waiting';
            if (appt.status === 'Completed') {
                statusClass = 'gray'; statusText = 'Completed';
            }
            if (appt.status === 'Cancelled') {
                statusClass = 'red'; statusText = 'Cancelled';
            }
            if (appt.status === 'In Progress') {
                statusClass = 'green'; statusText = 'In Progress';
            }

            const row = document.createElement('tr');
            row.innerHTML =
                '<td>' + appt.patient_name + '</td>' +
                '<td>' + appt.date + '</td>' +
                '<td>' + appt.time_slot + '</td>' +
                '<td><span class="status ' + statusClass + '">' +
                    statusText + '</span></td>' +
                '<td><button class="view-btn" data-id="' +
                    appt.patient_id + '">View History</button></td>';

            tbody.appendChild(row);
        });

        // style view buttons
        document.querySelectorAll('.view-btn').forEach(function(btn) {
            btn.style.cssText =
                'padding:5px 12px; background:#0F4C5C; color:white;' +
                'border:none; border-radius:4px; font-size:12px; cursor:pointer;';
            btn.onclick = function() {
                window.location.href =
                    '/doctor/patient-history?patient_id=' + this.dataset.id;
            };
        });
    }


    // ---- 5. Filter buttons ----
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {

            document.querySelectorAll('.filter-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            this.classList.add('active');

            const filter = this.dataset.filter;

            if (filter === 'all') {
                buildTable(allAppointments);
            } else if (filter === 'today') {
                buildTable(allAppointments.filter(function(a) {
                    return a.date === todayStr;
                }));
            } else if (filter === 'upcoming') {
                buildTable(allAppointments.filter(function(a) {
                    return a.date >= todayStr && a.status !== 'Completed';
                }));
            } else if (filter === 'completed') {
                buildTable(allAppointments.filter(function(a) {
                    return a.status === 'Completed';
                }));
            }
        });
    });


    // ---- 6. Logout ----
    async function logout() {
    const confirmed = confirm('Are you sure you want to logout?');
    if (!confirmed) return;

    try {
        // check if admin session
        const sessionRes  = await fetch('/api/check-session');
        const sessionData = await sessionRes.json();

        let url = '/api/logout';
        if (sessionData.role === 'admin') {
            url = '/api/admin/logout';
        }

        const res = await fetch(url, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            window.location.href = '/';
        } else {
            // force redirect anyway
            window.location.href = '/';
        }

    } catch(e) {
        // force redirect even if fetch fails
        window.location.href = '/';
    }
}

    // ---- Helper ----
    function showMsg(text, type) {
        const msg = document.getElementById('page-msg');
        msg.textContent      = text;
        msg.style.display    = 'block';
        msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
        msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';
        setTimeout(function() { msg.style.display = 'none'; }, 3000);
    }


    // ---- Init ----
    loadDoctorInfo();
    loadAppointments();

</script>
</body>
</html>
