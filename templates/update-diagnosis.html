<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Diagnosis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='doctors.css') }}">
</head>
<body>
    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
    </div>

    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/doctor/dashboard">Dashboard</a>
                <a href="/doctor/schedule">Schedule</a>
                <a href="/doctor/patient-history">Patients</a>
                <a href="/doctor/update-diagnosis" class="active">Report</a>
            </nav>
            <div class="doc-info">
                <div class="avatar" id="doc-avatar">--</div>
                <p id="doc-name">Loading...</p>
                <p id="doc-spec">Loading...</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>Update Diagnosis</h2>
                    <p>Add or update patient diagnosis and reports</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Form -->
            <div class="diagnosis-form" style="background:white;
                margin:15px 20px; border-radius:8px; padding:20px;
                display:flex; flex-direction:column; gap:16px;">

                <!-- Patient selector -->
                <div class="form-group">
                    <label>Select Patient</label>
                    <select id="patient-select">
                        <option value="">-- Select a patient --</option>
                    </select>
                </div>

                <!-- Patient info -->
                <div id="patient-info" style="display:none;
                    background:#f0f9f6; border-radius:8px;
                    padding:12px 15px;
                    border-left:4px solid #0F4C5C;">
                    <p id="info-name" style="font-weight:bold;
                        color:#333; font-size:14px;"></p>
                    <p id="info-email" style="font-size:12px;
                        color:#888; margin-top:3px;"></p>
                </div>

                <!-- Appointment status update -->
                <div id="status-section" style="display:none;">
                    <div class="form-group">
                        <label>Update Appointment Status</label>
                        <div style="display:flex; gap:10px; flex-wrap:wrap;
                            margin-top:6px;">
                            <button class="status-btn" data-status="Booked"
                                style="padding:8px 16px; border-radius:6px;
                                border:1px solid #0F4C5C; background:white;
                                color:#0F4C5C; font-size:13px; cursor:pointer;">
                                Booked
                            </button>
                            <button class="status-btn" data-status="In Progress"
                                style="padding:8px 16px; border-radius:6px;
                                border:1px solid #1D9E75; background:white;
                                color:#1D9E75; font-size:13px; cursor:pointer;">
                                In Progress
                            </button>
                            <button class="status-btn" data-status="Completed"
                                style="padding:8px 16px; border-radius:6px;
                                border:1px solid #555; background:white;
                                color:#555; font-size:13px; cursor:pointer;">
                                Completed
                            </button>
                        </div>
                        <p id="current-status" style="font-size:12px;
                            color:#888; margin-top:6px;"></p>
                    </div>
                </div>

                <!-- Diagnosis -->
                <div class="form-group">
                    <label>Diagnosis</label>
                    <textarea id="diagnosis" rows="3"
                        placeholder="Enter diagnosis details...">
                    </textarea>
                </div>

                <!-- Report notes -->
                <div class="form-group">
                    <label>Report / Notes</label>
                    <textarea id="report" rows="3"
                        placeholder="Enter report or additional notes...">
                    </textarea>
                </div>

                <!-- Prescription table -->
                <div class="form-group">
                    <label>Prescription</label>
                    <table id="prescription-table" style="
                        width:100%; border-collapse:collapse;
                        margin-top:6px;">
                        <tr>
                            <th style="background:#0F4C5C; color:white;
                                padding:10px; text-align:left; font-size:13px;">
                                Medicine Name
                            </th>
                            <th style="background:#0F4C5C; color:white;
                                padding:10px; text-align:left; font-size:13px;">
                                Dosage
                            </th>
                            <th style="background:#0F4C5C; color:white;
                                padding:10px; text-align:left; font-size:13px;">
                                Duration
                            </th>
                            <th style="background:#0F4C5C; color:white;
                                padding:10px; text-align:left; font-size:13px;">
                                Action
                            </th>
                        </tr>
                        <tbody id="prescription-tbody">
                            <tr id="prescription-row-1">
                                <td style="padding:8px; border-bottom:1px solid #eee;">
                                    <input type="text" placeholder="e.g. Paracetamol"
                                        style="width:100%; padding:7px;
                                        border:1px solid #ccc; border-radius:4px;
                                        font-size:13px;">
                                </td>
                                <td style="padding:8px; border-bottom:1px solid #eee;">
                                    <input type="text" placeholder="e.g. 500mg"
                                        style="width:100%; padding:7px;
                                        border:1px solid #ccc; border-radius:4px;
                                        font-size:13px;">
                                </td>
                                <td style="padding:8px; border-bottom:1px solid #eee;">
                                    <input type="text" placeholder="e.g. 5 days"
                                        style="width:100%; padding:7px;
                                        border:1px solid #ccc; border-radius:4px;
                                        font-size:13px;">
                                </td>
                                <td style="padding:8px; border-bottom:1px solid #eee;">
                                    <button onclick="removeRow(this)"
                                        style="padding:5px 10px; background:#fde8e8;
                                        color:#c0392b; border:none;
                                        border-radius:4px; cursor:pointer;
                                        font-size:12px;">
                                        Remove
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <!-- Add row button -->
                    <button onclick="addRow()" style="
                        margin-top:10px; padding:8px 16px;
                        background:#e1f5ee; color:#0F4C5C;
                        border:1px solid #0F4C5C; border-radius:6px;
                        font-size:13px; cursor:pointer;">
                        + Add Medicine
                    </button>
                </div>

                <!-- Buttons -->
                <div class="form-buttons">
                    <button class="btn-save" id="save-btn">
                        Save Diagnosis
                    </button>
                    <button class="btn-cancel" id="clear-btn">
                        Clear
                    </button>
                </div>

            </div>
        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = {
        weekday: 'short', day: 'numeric',
        month: 'long', year: 'numeric'
    };
    document.getElementById('current-date').textContent =
        today.toLocaleDateString('en-GB', options);

    let selectedPatientId   = null;
    let selectedAppointmentId = null;


    // ---- 2. Load doctor info ----
    async function loadDoctorInfo() {
        try {
            const res  = await fetch('/api/doctor/me');
            if (!res.ok) { window.location.href = '/'; return; }
            const data = await res.json();

            document.getElementById('doc-name').textContent = data.name;
            document.getElementById('doc-spec').textContent = data.specialization;
            const initials = data.name.split(' ')
                .map(function(n) { return n[0]; })
                .join('').toUpperCase();
            document.getElementById('doc-avatar').textContent = initials;

        } catch(e) {}
    }


    // ---- 3. Load patients from appointments ----
    async function loadPatients() {
        try {
            const res  = await fetch('/api/doctor/appointments');
            if (!res.ok) return;
            const data = await res.json();

            // get unique patients with their latest appointment
            const seen     = {};
            const patients = [];
            data.appointments.forEach(function(appt) {
                if (!seen[appt.patient_id]) {
                    seen[appt.patient_id] = true;
                    patients.push({
                        id            : appt.patient_id,
                        name          : appt.patient_name,
                        email         : appt.patient_email,
                        appointment_id: appt.appointment_id,
                        status        : appt.status
                    });
                }
            });

            const select = document.getElementById('patient-select');
            patients.forEach(function(p) {
                const option = document.createElement('option');
                option.value              = p.id;
                option.textContent        = p.name;
                option.dataset.email      = p.email || '';
                option.dataset.appt_id   = p.appointment_id;
                option.dataset.status    = p.status;
                select.appendChild(option);
            });

            // check URL params
            const urlParams = new URLSearchParams(window.location.search);
            const patId = urlParams.get('patient_id');
            if (patId) {
                select.value = patId;
                select.dispatchEvent(new Event('change'));
            }

        } catch(e) {}
    }


    // ---- 4. Patient dropdown change ----
    document.getElementById('patient-select').addEventListener(
        'change', function() {

        const patientId = this.value;
        const info      = document.getElementById('patient-info');
        const statusSec = document.getElementById('status-section');

        if (!patientId) {
            info.style.display      = 'none';
            statusSec.style.display = 'none';
            selectedPatientId       = null;
            selectedAppointmentId   = null;
            return;
        }

        const option = this.options[this.selectedIndex];
        selectedPatientId     = patientId;
        selectedAppointmentId = option.dataset.appt_id;

        document.getElementById('info-name').textContent  = option.textContent;
        document.getElementById('info-email').textContent = option.dataset.email;
        document.getElementById('current-status').textContent =
            'Current status: ' + option.dataset.status;

        info.style.display      = 'block';
        statusSec.style.display = 'block';
    });


    // ---- 5. Status buttons ----
    document.querySelectorAll('.status-btn').forEach(function(btn) {
        btn.addEventListener('click', async function() {

            if (!selectedAppointmentId) {
                showMsg('Please select a patient first!', 'error');
                return;
            }

            const newStatus = this.dataset.status;

            try {
                const res = await fetch(
                    '/api/doctor/appointment/' +
                    selectedAppointmentId + '/status',
                    {
                        method : 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body   : JSON.stringify({ status: newStatus })
                    }
                );

                const data = await res.json();

                if (res.ok) {
                    document.getElementById('current-status').textContent =
                        'Current status: ' + newStatus;
                    showMsg('Status updated to ' + newStatus + '!', 'success');
                } else {
                    showMsg(data.message || 'Failed to update status.', 'error');
                }

            } catch(e) {
                showMsg('Could not connect to server.', 'error');
            }
        });
    });


    // ---- 6. Add prescription row ----
    let rowCount = 1;

    function addRow() {
        rowCount++;
        const tbody = document.getElementById('prescription-tbody');
        const row   = document.createElement('tr');
        row.id = 'prescription-row-' + rowCount;
        row.innerHTML =
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. Amoxicillin"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. 250mg"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. 7 days"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<button onclick="removeRow(this)"' +
                'style="padding:5px 10px; background:#fde8e8;' +
                'color:#c0392b; border:none; border-radius:4px;' +
                'cursor:pointer; font-size:12px;">Remove</button>' +
            '</td>';
        tbody.appendChild(row);
    }

    function removeRow(btn) {
        const row = btn.closest('tr');
        const allRows = document.querySelectorAll('#prescription-tbody tr');
        if (allRows.length > 1) {
            row.remove();
        } else {
            showMsg('At least one prescription row is required!', 'error');
        }
    }


    // ---- 7. Collect prescription data ----
    function getPrescriptionData() {
        const rows   = document.querySelectorAll('#prescription-tbody tr');
        const result = [];

        rows.forEach(function(row) {
            const inputs  = row.querySelectorAll('input');
            const medicine = inputs[0].value.trim();
            const dosage   = inputs[1].value.trim();
            const duration = inputs[2].value.trim();

            if (medicine) {
                result.push(
                    medicine + ' — ' + dosage + ' — ' + duration
                );
            }
        });

        return result.join('\n');
    }


    // ---- 8. Save diagnosis ----
    document.getElementById('save-btn').addEventListener(
        'click', async function() {

        const patientId  = document.getElementById('patient-select').value;
        const diagnosis  = document.getElementById('diagnosis').value.trim();
        const report     = document.getElementById('report').value.trim();
        const prescription = getPrescriptionData();

        if (!patientId) {
            showMsg('Please select a patient!', 'error');
            return;
        }
        if (!diagnosis) {
            showMsg('Please enter a diagnosis!', 'error');
            return;
        }

        try {
            const res = await fetch(
                '/api/doctor/patient/' + patientId + '/update',
                {
                    method : 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body   : JSON.stringify({
                        diagnosis   : diagnosis,
                        report      : report,
                        prescription: prescription
                    })
                }
            );

            const data = await res.json();

            if (res.ok) {
                showMsg('Diagnosis saved successfully!', 'success');
                clearForm();
            } else {
                showMsg(data.message || 'Failed to save.', 'error');
            }

        } catch(e) {
            showMsg('Could not connect to server.', 'error');
        }
    });


    // ---- 9. Clear form ----
    function clearForm() {
        document.getElementById('patient-select').value = '';
        document.getElementById('diagnosis').value      = '';
        document.getElementById('report').value         = '';
        document.getElementById('patient-info').style.display   = 'none';
        document.getElementById('status-section').style.display = 'none';

        // reset prescription table to one empty row
        document.getElementById('prescription-tbody').innerHTML =
            '<tr id="prescription-row-1">' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. Paracetamol"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. 500mg"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<input type="text" placeholder="e.g. 5 days"' +
                'style="width:100%; padding:7px; border:1px solid #ccc;' +
                'border-radius:4px; font-size:13px;">' +
            '</td>' +
            '<td style="padding:8px; border-bottom:1px solid #eee;">' +
                '<button onclick="removeRow(this)"' +
                'style="padding:5px 10px; background:#fde8e8;' +
                'color:#c0392b; border:none; border-radius:4px;' +
                'cursor:pointer; font-size:12px;">Remove</button>' +
            '</td>' +
            '</tr>';
        rowCount = 1;
    }

    document.getElementById('clear-btn').addEventListener('click', clearForm);



    async function logout() {
    const confirmed = confirm('Are you sure you want to logout?');
    if (!confirmed) return;

    try {
        // check if admin session
        const sessionRes  = await fetch('/api/check-session');
        const sessionData = await sessionRes.json();

        let url = '/api/logout';
        if (sessionData.role === 'admin') {
            url = '/api/admin/logout';
        }

        const res = await fetch(url, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            window.location.href = '/';
        } else {
            // force redirect anyway
            window.location.href = '/';
        }

    } catch(e) {
        // force redirect even if fetch fails
        window.location.href = '/';
    }
}


    function showMsg(text, type) {
        const msg = document.getElementById('page-msg');
        msg.textContent      = text;
        msg.style.display    = 'block';
        msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
        msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';
        setTimeout(function() { msg.style.display = 'none'; }, 3000);
    }


    
    loadDoctorInfo();
    loadPatients();

</script>
</body>
</html>
