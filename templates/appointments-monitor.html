<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments Monitor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='management.css') }}">
</head>
<body>

    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management System</div>
    </div>

    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/admin/manage-doctors">Manage Doctors</a>
                <a href="/admin/availability">Availability</a>
                <a href="/admin/appointments" class="active">Appointments</a>
                <a href="/admin/daily-schedule">Daily Schedule</a>
                <a href="/admin/settings">Settings</a>
            </nav>
            <div class="doc-info">
                <div class="avatar">AD</div>
                <p>Admin</p>
                <p>Management</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>Appointments Monitor</h2>
                    <p>View and manage all appointments</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Filter bar -->
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="All">All</button>
                <button class="filter-btn" data-filter="Booked">Confirmed</button>
                <button class="filter-btn" data-filter="Pending">Pending</button>
                <button class="filter-btn" data-filter="Completed">Completed</button>
                <button class="filter-btn" data-filter="Cancelled">Cancelled</button>
            </div>

            <!-- Appointments table -->
            <div class="appointment-section">
                <h3>All Appointments
                    <span id="appt-count" style="
                        font-size:12px; background-color:#1a3c4d;
                        color:white; padding:2px 8px;
                        border-radius:12px; margin-left:8px;">
                    </span>
                </h3>
                <table id="appointments-table">
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Department</th>
                        <th>Date</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </table>
            </div>

        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = {
        weekday: 'short', day: 'numeric',
        month: 'long', year: 'numeric'
    };
    document.getElementById('current-date').textContent =
        today.toLocaleDateString('en-GB', options);

    let allAppointments = [];


    // ---- 2. Load appointments ----
    async function loadAppointments() {
        try {
            const res  = await fetch('/api/admin/appointments');
            const data = await res.json();

            if (!res.ok) {
                showMsg(data.message || 'Failed to load.', 'error');
                return;
            }

            allAppointments = data.appointments;
            buildTable(allAppointments);

        } catch(e) {
            showMsg('Could not connect to server.', 'error');
        }
    }


    // ---- 3. Build table ----
    function buildTable(appointments) {
        const table = document.getElementById('appointments-table');

        const oldRows = table.querySelectorAll('tr:not(:first-child)');
        oldRows.forEach(function(row) { row.remove(); });

        document.getElementById('appt-count').textContent =
            appointments.length;

        if (appointments.length === 0) {
            const row = document.createElement('tr');
            row.innerHTML =
                '<td colspan="6" style="text-align:center; color:#888;">' +
                'No appointments found.</td>';
            table.appendChild(row);
            return;
        }

        appointments.forEach(function(appt) {

            let statusClass = 'gray';
            if (appt.status === 'Booked')    statusClass = 'green';
            if (appt.status === 'Pending')   statusClass = 'orange';
            if (appt.status === 'Cancelled') statusClass = 'red';

            const row = document.createElement('tr');
            row.setAttribute('data-status', appt.status);
            row.innerHTML =
                '<td>' + appt.patient_name + '</td>' +
                '<td>' + appt.doctor_name + '</td>' +
                '<td>' + appt.department + '</td>' +
                '<td>' + appt.date + '</td>' +
                '<td>' + appt.time_slot + '</td>' +
                '<td><span class="status ' + statusClass + '">' +
                    appt.status + '</span></td>';

            table.appendChild(row);
        });
    }


    // ---- 4. Filter buttons ----
    document.querySelectorAll('.filter-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {

            document.querySelectorAll('.filter-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            this.classList.add('active');

            const filter = this.dataset.filter;

            if (filter === 'All') {
                buildTable(allAppointments);
            } else {
                const filtered = allAppointments.filter(function(a) {
                    return a.status === filter;
                });
                buildTable(filtered);
            }
        });
    });


    // ---- 5. Logout ----
    async function logout() {
    const confirmed = confirm('Are you sure you want to logout?');
    if (!confirmed) return;

    try {
        // check if admin session
        const sessionRes  = await fetch('/api/check-session');
        const sessionData = await sessionRes.json();

        let url = '/api/logout';
        if (sessionData.role === 'admin') {
            url = '/api/admin/logout';
        }

        const res = await fetch(url, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            window.location.href = '/';
        } else {
            window.location.href = '/';
        }

    } catch(e) {
        
        window.location.href = '/';
    }
}


    // ---- Helper ----
    function showMsg(text, type) {
        const msg = document.getElementById('page-msg');
        msg.textContent      = text;
        msg.style.display    = 'block';
        msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
        msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';
        setTimeout(function() { msg.style.display = 'none'; }, 3000);
    }


    // ---- Init ----
    loadAppointments();

</script>
</body>
</html>
