<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Management System</title>
</head>
<body>
    <link rel="stylesheet" href="index.css">
    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management system</div>
        <button onclick="openModal()" class="login-btn">Login / Signup</button>
    </div>
   
<div class="feature-slider">

    <div class="feature active">
        <div class="feature-image">
            <img src="1.png">
        </div>
        <div class="feature-content">
            <h2>Book Appointments</h2>
            <p>Schedule hospital visits easily without waiting in queues.</p>
        </div>
    </div>

    <div class="feature">
        <div class="feature-image">
            <img src="3.png">
        </div>
        <div class="feature-content">
            <h2>Find Doctors</h2>
            <p>Search doctors based on specialization and availability.</p>
        </div>
    </div>

    <div class="feature">
        <div class="feature-image">
            <img src="2.png">
        </div>
        <div class="feature-content">
            <h2>View Medical Records</h2>
            <p>Access your reports and appointment history anytime.</p>
        </div>
    </div>

    <button class="prev" onclick="changeFeature(-1)">❮</button>
    <button class="next" onclick="changeFeature(1)">❯</button>

</div>


    </div>
<div id="authModal" class="modal">
    <span class="close" onclick="closeModal()">&times;</span>
    
    <div id="loginForm" class="form active-form">
        <label for="email">Email:</label>
        <input type="email" placeholder="Email">
        <label for="password">Password:</label>
        <input type="password" placeholder="Password">
        <button class="submit-btn">Login</button>
    </div>
    <div id="signupForm" class="form">
        <label for="username">Full name:</label>
        <input type="text" placeholder="Full Name">
        <label for="email">Email:</label>
        <input type="email" placeholder="Email">
        <label for="tel">Phone-number:</label>
        <input type="tel" placeholder="Phone-number">
        <label for="Password">Password:</label>
        <input type="password" placeholder="Password">
        <button class="submit-btn">Signup</button>
    </div>
    <div class="tabs">
        <button onclick="showLogin()" id="loginTab" class="active-tab">Login</button>
        <button onclick="showSignup()" id="signupTab">Signup</button>
    </div>
</div>


    </button>
</div>
    <script>
let current = 0;
let features = document.getElementsByClassName("feature");
let interval;

showFeature(current);
startAuto();

function showFeature(index) {
    for (let i = 0; i < features.length; i++) {
        features[i].classList.remove("active");
    }
    features[index].classList.add("active");
}

function changeFeature(direction) {
    clearInterval(interval);

    current += direction;

    if (current >= features.length) current = 0;
    if (current < 0) current = features.length - 1;

    showFeature(current);
    startAuto();
}

function nextAuto() {
    current++;
    if (current >= features.length) current = 0;
    showFeature(current);
}

function startAuto() {
    interval = setInterval(nextAuto, 4000);
}
function openModal() {
    document.getElementById("authModal").style.display = "flex";
}

function closeModal() {
    document.getElementById("authModal").style.display = "none";
}

function showLogin() {
    document.getElementById("loginForm").classList.add("active-form");
    document.getElementById("signupForm").classList.remove("active-form");

    document.getElementById("loginTab").classList.add("active-tab");
    document.getElementById("signupTab").classList.remove("active-tab");
}

function showSignup() {
    document.getElementById("signupForm").classList.add("active-form");
    document.getElementById("loginForm").classList.remove("active-form");

    document.getElementById("signupTab").classList.add("active-tab");
    document.getElementById("loginTab").classList.remove("active-tab");
}
</script>
</body>
</html>
