<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Doctors</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='management.css') }}">
</head>
<body>

    <div class="navbar">
        <div id="name">Hospital Appointment and Patient Management System</div>
    </div>

    <div class="page">

        <div class="sidebar">
            <div class="logo">MediPortal</div>
            <nav>
                <a href="/admin/dashboard">Dashboard</a>
                <a href="/admin/manage-doctors" class="active">Manage Doctors</a>
                <a href="/admin/availability">Availability</a>
                <a href="/admin/appointments">Appointments</a>
                <a href="/admin/daily-schedule">Daily Schedule</a>
                <a href="/admin/settings">Settings</a>
            </nav>
            <div class="doc-info">
                <div class="avatar">AD</div>
                <p>Admin</p>
                <p>Management</p>
            </div>
            <div style="padding:10px 22px 20px;">
                <button onclick="logout()" style="
                    width:100%; padding:8px;
                    background:white; color:#c0392b;
                    border:1px solid #c0392b;
                    border-radius:6px; font-size:13px;
                    cursor:pointer;">Logout</button>
            </div>
        </div>

        <div class="main">

            <div class="topbar">
                <div>
                    <h2>Manage Doctors</h2>
                    <p>Add, view and remove doctors</p>
                </div>
                <p id="current-date">-</p>
            </div>

            <!-- Message box -->
            <div id="page-msg" style="display:none; margin:0 20px;
                padding:10px; border-radius:6px; font-size:13px;
                text-align:center;">
            </div>

            <!-- Doctors table -->
            <div class="appointment-section">
                <h3>All Doctors
                    <span id="doctor-count" style="
                        font-size:12px; background-color:#1a3c4d;
                        color:white; padding:2px 8px;
                        border-radius:12px; margin-left:8px;">
                    </span>
                </h3>
                <table id="doctors-table">
                    <tr>
                        <th>Name</th>
                        <th>Specialization</th>
                        <th>Department</th>
                        <th>Working Days</th>
                        <th>Hours</th>
                        <th>Action</th>
                    </tr>
                </table>
            </div>

            <!-- Add new doctor form -->
            <div class="appointment-section">
                <h3>Add New Doctor</h3>
                <div class="add-doctor-form">

                    <div class="form-row">
                        <div class="form-group">
                            <label>Full Name</label>
                            <input type="text" id="doc-name"
                            placeholder="e.g. Dr. John Smith">
                        </div>
                        <div class="form-group">
                            <label>Specialization</label>
                            <input type="text" id="doc-spec"
                            placeholder="e.g. Cardiologist">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" id="doc-dept"
                            placeholder="e.g. Cardiology">
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="doc-email"
                            placeholder="e.g. doctor@hospital.com">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Password</label>
                            <input type="password" id="doc-password"
                            placeholder="Set login password">
                        </div>
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" id="doc-phone"
                            placeholder="e.g. 9800000000">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Working Days</label>
                        <div class="days-row">
                            <label class="day-checkbox">
                                <input type="checkbox" value="Mon"> Mon
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Tue"> Tue
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Wed"> Wed
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Thu"> Thu
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Fri"> Fri
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Sat"> Sat
                            </label>
                            <label class="day-checkbox">
                                <input type="checkbox" value="Sun"> Sun
                            </label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="time" id="doc-start" value="09:00">
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="time" id="doc-end" value="17:00">
                        </div>
                    </div>

                    <div class="form-buttons">
                        <button class="btn-save" id="add-btn">
                            Add Doctor
                        </button>
                        <button class="btn-cancel" id="clear-btn">
                            Clear
                        </button>
                    </div>

                </div>
            </div>

        </div>
    </div>

<script>

    // ---- 1. Auto date ----
    const today = new Date();
    const options = {
        weekday: 'short', day: 'numeric',
        month: 'long', year: 'numeric'
    };
    document.getElementById('current-date').textContent =
        today.toLocaleDateString('en-GB', options);


    // ---- 2. Load doctors ----
    async function loadDoctors() {
        try {
            const res  = await fetch('/api/admin/doctors');
            const data = await res.json();

            if (!res.ok) {
                showMsg(data.message || 'Failed to load.', 'error');
                return;
            }

            buildDoctorsTable(data.doctors);

        } catch(e) {
            showMsg('Could not connect to server.', 'error');
        }
    }


    // ---- 3. Build doctors table ----
    function buildDoctorsTable(doctors) {
        const table = document.getElementById('doctors-table');

        // remove old rows except header
        const oldRows = table.querySelectorAll('tr:not(:first-child)');
        oldRows.forEach(function(row) { row.remove(); });

        document.getElementById('doctor-count').textContent = doctors.length;

        if (doctors.length === 0) {
            const row = document.createElement('tr');
            row.innerHTML =
                '<td colspan="6" style="text-align:center; color:#888;">' +
                'No doctors found.</td>';
            table.appendChild(row);
            return;
        }

        doctors.forEach(function(doc) {
            const row = document.createElement('tr');
            row.innerHTML =
                '<td>' + doc.name + '</td>' +
                '<td>' + doc.specialization + '</td>' +
                '<td>' + doc.department + '</td>' +
                '<td>' + (doc.working_days || 'N/A') + '</td>' +
                '<td>' + (doc.start_time || '-') + ' – ' +
                    (doc.end_time || '-') + '</td>' +
                '<td><button class="cancel-btn" data-id="' +
                    doc.id + '">Remove</button></td>';
            table.appendChild(row);
        });

        attachRemoveButtons();
    }


    // ---- 4. Remove doctor ----
    function attachRemoveButtons() {
        document.querySelectorAll('.cancel-btn').forEach(function(btn) {
            btn.onclick = async function() {
                const confirmed = confirm(
                    'Are you sure you want to remove this doctor?'
                );
                if (!confirmed) return;

                const docId = this.dataset.id;

                try {
                    const res  = await fetch(
                        '/api/admin/remove-doctor/' + docId,
                        { method: 'DELETE' }
                    );
                    const data = await res.json();

                    if (res.ok) {
                        showMsg('Doctor removed successfully!', 'success');
                        loadDoctors();
                    } else {
                        showMsg(data.message || 'Failed to remove.', 'error');
                    }
                } catch(e) {
                    showMsg('Could not connect to server.', 'error');
                }
            };
        });
    }


    // ---- 5. Add doctor ----
    document.getElementById('add-btn').addEventListener('click', async function() {

        const name     = document.getElementById('doc-name').value.trim();
        const spec     = document.getElementById('doc-spec').value.trim();
        const dept     = document.getElementById('doc-dept').value.trim();
        const email    = document.getElementById('doc-email').value.trim();
        const password = document.getElementById('doc-password').value.trim();
        const start    = document.getElementById('doc-start').value;
        const end      = document.getElementById('doc-end').value;

        // validate fields
        if (!name || !spec || !dept || !email || !password) {
            showMsg('Please fill in all required fields!', 'error');
            return;
        }

        // get checked days
        const checkedDays = document.querySelectorAll(
            '.day-checkbox input:checked'
        );
        if (checkedDays.length === 0) {
            showMsg('Please select at least one working day!', 'error');
            return;
        }

        // join days as "Mon,Tue,Wed"
        let days = [];
        checkedDays.forEach(function(cb) {
            days.push(cb.value);
        });
        const workingDays = days.join(',');

        try {
            const res  = await fetch('/api/admin/add-doctor', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({
                    name        : name,
                    specialization: spec,
                    department  : dept,
                    email       : email,
                    password    : password,
                    working_days: workingDays,
                    start_time  : start,
                    end_time    : end
                })
            });

            const data = await res.json();

            if (res.ok) {
                showMsg('Doctor added successfully!', 'success');
                clearForm();
                loadDoctors();
            } else {
                showMsg(data.message || 'Failed to add.', 'error');
            }

        } catch(e) {
            showMsg('Could not connect to server.', 'error');
        }
    });


    // ---- 6. Clear form ----
    function clearForm() {
        document.getElementById('doc-name').value     = '';
        document.getElementById('doc-spec').value     = '';
        document.getElementById('doc-dept').value     = '';
        document.getElementById('doc-email').value    = '';
        document.getElementById('doc-password').value = '';
        document.getElementById('doc-phone').value    = '';
        document.getElementById('doc-start').value    = '09:00';
        document.getElementById('doc-end').value      = '17:00';
        document.querySelectorAll('.day-checkbox input')
            .forEach(function(cb) { cb.checked = false; });
    }

    document.getElementById('clear-btn').addEventListener('click', clearForm);


    // ---- 7. Logout ----
    async function logout() {
    const confirmed = confirm('Are you sure you want to logout?');
    if (!confirmed) return;

    try {
        // check if admin session
        const sessionRes  = await fetch('/api/check-session');
        const sessionData = await sessionRes.json();

        let url = '/api/logout';
        if (sessionData.role === 'admin') {
            url = '/api/admin/logout';
        }

        const res = await fetch(url, {
            method : 'POST',
            headers: { 'Content-Type': 'application/json' }
        });

        if (res.ok) {
            window.location.href = '/';
        } else {
            window.location.href = '/';
        }

    } catch(e) {
        window.location.href = '/';
    }
}


    // ---- Helper ----
    function showMsg(text, type) {
        const msg = document.getElementById('page-msg');
        msg.textContent      = text;
        msg.style.display    = 'block';
        msg.style.background = type === 'error' ? '#fde8e8' : '#d4f4e8';
        msg.style.color      = type === 'error' ? '#c0392b' : '#0a6640';
        setTimeout(function() { msg.style.display = 'none'; }, 3000);
    }


    // ---- Init ----
    loadDoctors();

</script>
</body>
</html>
